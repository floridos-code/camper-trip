<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Unser Camper Roadtrip</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Camper Trip">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231f6f5c'/%3E%3Ctext x='50' y='66' font-size='55' text-anchor='middle'%3E%F0%9F%9A%90%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://tile.openstreetmap.org">
<link rel="preconnect" href="https://nominatim.openstreetmap.org">
<link rel="preconnect" href="https://router.project-osrm.org">
<link rel="dns-prefetch" href="https://firestore.googleapis.com">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="map"></div>

<div id="topbar">
  <div id="topRow">
    <div id="searchBox">
      <span style="opacity:.5;margin-right:6px;">🔍</span>
      <input id="searchInput" placeholder="Ort suchen …" />
    </div>
    <button id="menuBtn" onclick="toggleDrawer(true)">☰</button>
  </div>
  <div style="display:flex;justify-content:center;">
    <div id="tripBadge">🚐 11 Tage · 2 Erwachsene · 1 Kind (3 J.)</div>
  </div>
</div>

<div id="setupBanner">
  ⚠️ Firebase ist noch nicht konfiguriert. Trage deine Konfiguration im Code unter <code>firebaseConfig</code> ein (siehe README), damit deine Daten geräteübergreifend gespeichert werden.
</div>

<div id="placeToast"></div>

<button id="fab" onclick="openAddMenu()">＋</button>

<div id="drawerHandle">
  <div id="drawerGrip" onclick="toggleDrawer()"></div>
  <div id="drawerTabs">
    <button class="tabBtn active" data-type="route" onclick="setTab('route')">🧭 Route</button>
    <button class="tabBtn" data-type="activity" onclick="setTab('activity')">🎯 Aktivitäten</button>
    <button class="tabBtn" data-type="camper" onclick="setTab('camper')">🚐 Übernachtung</button>
  </div>
  <div id="subFilters" style="display:none;">
    <button class="filterPill active" data-f="all" onclick="setActivityFilter('all')">Alle</button>
    <button class="filterPill" data-f="outdoor" onclick="setActivityFilter('outdoor')">🌳 Outdoor</button>
    <button class="filterPill" data-f="indoor" onclick="setActivityFilter('indoor')">🏠 Indoor</button>
  </div>
  <div id="drawerList"></div>
</div>

<div id="overlay">
  <div id="formSheet"></div>
</div>

<div id="seedOverlay">
  <div class="spinner"></div>
  <div id="seedText">Route wird vorbereitet …</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<script type="module" src="app.js"></script>
</body>
</html>
